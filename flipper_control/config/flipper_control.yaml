joint_names:
  - left_front_arm_joint
  - right_front_arm_joint
  - left_rear_arm_joint
  - right_rear_arm_joint

direction_corrections:
  left_front_arm_joint: -1.0
  right_front_arm_joint: -1.0
  left_rear_arm_joint: 1.0
  right_rear_arm_joint: 1.0

controllers:
  csp: flipper_csp_controller
  csv: flipper_csv_controller

initial_profile: csp_position
initial_linkage_mode: independent

control_loop_hz: 100.0
state_publish_hz: 20.0
command_timeout: 0.4
dt_clamp: 0.02
jog_velocity_alpha: 1.0
reference_drift_threshold: 0.35
require_backend_feedback: true
short_horizon: 0.10

service_wait_timeout: 2.0
controller_switch_timeout: 2.0

controller_manager_ns: /controller_manager
backend_type: hybrid
hybrid_ns: /hybrid_motor_hw_node
runtime_state_topic: /hybrid_motor_hw_node/joint_runtime_states
canopen_ns: ""
canopen_diagnostics_topic: /diagnostics

# Fallback values used only when robot_description is unavailable.
fallback_min_position: -2.356
fallback_max_position: 2.356
fallback_max_velocity: 1.57
