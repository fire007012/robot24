# hybrid_motor_hw_node 使用的 ros_control joint_limits_interface 参数。
# 作用：为未出现在 URDF 的关节提供限幅参数，避免 "no limits found" 告警。
# 加载命名空间：/hybrid_motor_hw_node

joint_limits:
  left_front_wheel_joint:
    has_position_limits: false
    has_velocity_limits: true
    max_velocity: 12.0
    has_acceleration_limits: true
    max_acceleration: 25.0
    has_jerk_limits: false
    has_effort_limits: false

  right_front_wheel_joint:
    has_position_limits: false
    has_velocity_limits: true
    max_velocity: 12.0
    has_acceleration_limits: true
    max_acceleration: 25.0
    has_jerk_limits: false
    has_effort_limits: false

  ecb_joint_02:
