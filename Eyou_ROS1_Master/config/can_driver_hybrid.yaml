# Facade 专用 can_driver 配置。
#
# 这份文件故意保持为“平铺私参”结构，直接加载到
# /hybrid_motor_hw_node 私有命名空间，不能复用 can_driver 原生
# can_driver.yaml 里的 can_driver_node: 根。

control_frequency: 100.0
debug_bypass_ros_control: true
motor_query_hz: 20.0
pp_fast_write_enabled: true
pp_position_default_velocity_rad_s: 1.0472
pp_csp_default_velocity_rad_s: 3.0
startup_position_sync_timeout_sec: 1.0
safety_stop_on_fault: true
safety_require_enabled_for_motion: true
max_position_step_rad: 0.0
safety_hold_after_device_recover: true

joints:
  - name: smaller_arm
    motor_id: 0x13
    protocol: PP
    can_device: can0
    control_mode: csp
    position_scale: 65536
    velocity_scale: 65536
