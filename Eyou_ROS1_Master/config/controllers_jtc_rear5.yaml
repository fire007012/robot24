# Hybrid facade controller set for can1 rear5-only bringup.

joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 100

arm_position_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - elbow_pitch_joint
    - wrist_pitch_joint
    - wrist_roll_joint
    - wrist_yaw_joint
  allow_partial_joints_goal: true
  constraints:
    goal_time: 2.0
    stopped_velocity_tolerance: 0.05
    elbow_pitch_joint:
      trajectory: 0.10
      goal: 0.02
    wrist_pitch_joint:
      trajectory: 0.10
      goal: 0.02
    wrist_roll_joint:
      trajectory: 0.10
      goal: 0.02
    wrist_yaw_joint:
      trajectory: 0.10
      goal: 0.02
  stop_trajectory_duration: 0.1
  state_publish_rate: 50
  action_monitor_rate: 20

gripper_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - left_gripper_finger_joint
  gains:
    left_gripper_finger_joint: {p: 100.0, i: 1.0, d: 1.0, i_clamp: 1.0}
  constraints:
    goal_time: 1.0
    stopped_velocity_tolerance: 0.02
    left_gripper_finger_joint: {trajectory: 0.01, goal: 0.005}
  stop_trajectory_duration: 0.1
  state_publish_rate: 50
  action_monitor_rate: 20