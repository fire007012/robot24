# Hybrid facade default controller set for MoveIt execution via ros_control JTC.

joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 100

arm_position_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - shoulder_yaw_joint
    - shoulder_pitch_joint
    - elbow_pitch_joint
    - wrist_pitch_joint
    - wrist_roll_joint
    - wrist_yaw_joint
  constraints:
    goal_time: 2.0
    stopped_velocity_tolerance: 0.05
    shoulder_yaw_joint:
      trajectory: 0.10
      goal: 0.02
    shoulder_pitch_joint:
      trajectory: 0.10
      goal: 0.02
    elbow_pitch_joint:
      trajectory: 0.10
      goal: 0.02
    wrist_pitch_joint:
      trajectory: 0.10
      goal: 0.02
    wrist_roll_joint:
      trajectory: 0.10
      goal: 0.02
    wrist_yaw_joint:
      trajectory: 0.10
      goal: 0.02
  stop_trajectory_duration: 0.1
  state_publish_rate: 50
  action_monitor_rate: 20

gripper_controller:
  # 夹爪右指由 URDF mimic 左指，这里只控制真实驱动的左夹爪关节。
  type: position_controllers/JointTrajectoryController
  joints:
    - left_gripper_finger_joint
  gains:
    left_gripper_finger_joint: {p: 100.0, i: 1.0, d: 1.0, i_clamp: 1.0}
  constraints:
    goal_time: 1.0
    stopped_velocity_tolerance: 0.02
    left_gripper_finger_joint: {trajectory: 0.01, goal: 0.005}
  stop_trajectory_duration: 0.1
  state_publish_rate: 50
  action_monitor_rate: 20

flipper_csp_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - left_front_arm_joint
    - right_front_arm_joint
    - left_rear_arm_joint
    - right_rear_arm_joint
  allow_partial_joints_goal: true
  constraints:
    goal_time: 1.0
    stopped_velocity_tolerance: 0.05
    left_front_arm_joint: {trajectory: 0.10, goal: 0.03}
    right_front_arm_joint: {trajectory: 0.10, goal: 0.03}
    left_rear_arm_joint: {trajectory: 0.10, goal: 0.03}
    right_rear_arm_joint: {trajectory: 0.10, goal: 0.03}
  stop_trajectory_duration: 0.1
  state_publish_rate: 50
  action_monitor_rate: 20

flipper_csv_controller:
  type: velocity_controllers/JointTrajectoryController
  joints:
    - left_front_arm_joint
    - right_front_arm_joint
    - left_rear_arm_joint
    - right_rear_arm_joint
  allow_partial_joints_goal: true
  gains:
    left_front_arm_joint: {p: 2.0, i: 0.0, d: 0.0, i_clamp: 0.0}
    right_front_arm_joint: {p: 2.0, i: 0.0, d: 0.0, i_clamp: 0.0}
    left_rear_arm_joint: {p: 2.0, i: 0.0, d: 0.0, i_clamp: 0.0}
    right_rear_arm_joint: {p: 2.0, i: 0.0, d: 0.0, i_clamp: 0.0}
  velocity_ff:
    left_front_arm_joint: 1.0
    right_front_arm_joint: 1.0
    left_rear_arm_joint: 1.0
    right_rear_arm_joint: 1.0
  constraints:
    goal_time: 1.0
    stopped_velocity_tolerance: 0.05
    left_front_arm_joint: {trajectory: 0.20, goal: 0.05}
    right_front_arm_joint: {trajectory: 0.20, goal: 0.05}
    left_rear_arm_joint: {trajectory: 0.20, goal: 0.05}
    right_rear_arm_joint: {trajectory: 0.20, goal: 0.05}
  stop_trajectory_duration: 0.1
  state_publish_rate: 50
  action_monitor_rate: 20

wheel_controller:
  type: diff_drive_controller/DiffDriveController
  left_wheel: left_front_wheel_joint
  right_wheel: right_front_wheel_joint
  publish_rate: 50.0
  cmd_vel_timeout: 0.3
  base_frame_id: base_link
  odom_frame_id: odom
  enable_odom_tf: true
  wheel_separation: 0.36
  wheel_radius: 0.075
  # noetic 的 diff_drive_controller 初始化时会读取这两个 6x6 协方差对角线参数；
  # 缺失时会在 setOdomPubFields() 路径抛异常，导致 controller load 失败。
  pose_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.03]
  twist_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 0.03]
  linear:
    x:
      has_velocity_limits: true
      max_velocity: 0.8
      has_acceleration_limits: true
      max_acceleration: 1.0
  angular:
    z:
      has_velocity_limits: true
      max_velocity: 1.5
      has_acceleration_limits: true
      max_acceleration: 2.0
