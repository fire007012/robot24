# Hybrid facade default controller set for MoveIt execution via ros_control JTC.

joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 100

arm_position_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - shoulder_yaw_joint
    - shoulder_pitch_joint
    - elbow_pitch_joint
    - wrist_pitch_joint
    - wrist_roll_joint
    - wrist_yaw_joint
  constraints:
    goal_time: 1.0
    stopped_velocity_tolerance: 0.02
    shoulder_yaw_joint:
      trajectory: 0.05
      goal: 0.01
    shoulder_pitch_joint:
      trajectory: 0.05
      goal: 0.01
    elbow_pitch_joint:
      trajectory: 0.05
      goal: 0.01
    wrist_pitch_joint:
      trajectory: 0.05
      goal: 0.01
    wrist_roll_joint:
      trajectory: 0.05
      goal: 0.01
    wrist_yaw_joint:
      trajectory: 0.05
      goal: 0.01
  stop_trajectory_duration: 0.1
  state_publish_rate: 50
  action_monitor_rate: 20
