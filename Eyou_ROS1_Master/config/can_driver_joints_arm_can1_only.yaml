# =============================================================================
# Hybrid 专用 joints 覆盖层（机械臂 can1 调试）
#
# 目标：仅保留 can1 上实际接入的机械臂 6 轴与夹爪，避免在机械臂单独联调时
# 因底盘轮子 joints 缺少反馈而卡住 startup sync。
# =============================================================================

can_driver_node:
  joints:
    - name: shoulder_yaw_joint
      motor_id: 0x145
      protocol: MT
      can_device: can1
      control_mode: position
      position_scale: 1.7453292519943296e-04
      velocity_scale: 1.7453292519943296e-04
      direction_sign: 1.0

    - name: shoulder_pitch_joint
      motor_id: 0x146
      protocol: MT
      can_device: can1
      control_mode: position
      position_scale: 1.7453292519943296e-04
      velocity_scale: 1.7453292519943296e-04
      direction_sign: 1.0

    - name: elbow_pitch_joint
      motor_id: 0x1F
      protocol: PP
      can_device: can1
      control_mode: csp
      position_scale: 65536
      velocity_scale: 65536
      direction_sign: -1.0
      ip_max_velocity: 1.0
      ip_max_acceleration: 0.8
      ip_max_jerk: 4.0
      ip_goal_tolerance: 0.001

    - name: wrist_pitch_joint
      motor_id: 0x20
      protocol: PP
      can_device: can1
      control_mode: csp
      position_scale: 65536
      velocity_scale: 65536
      ip_max_velocity: 1.0
      ip_max_acceleration: 2.0
      ip_max_jerk: 10.0
      ip_goal_tolerance: 0.001

    - name: wrist_roll_joint
      motor_id: 0x21
      protocol: PP
      can_device: can1
      control_mode: csp
      position_scale: 65536
      velocity_scale: 65536

    - name: wrist_yaw_joint
      motor_id: 0x22
      protocol: PP
      can_device: can1
      control_mode: csp
      position_scale: 65536
      velocity_scale: 65536
      direction_sign: -1.0

    - name: left_gripper_finger_joint
      motor_id: 0x1E
      protocol: PP
      can_device: can1
      control_mode: csp
      position_scale: 65536
      velocity_scale: 65536