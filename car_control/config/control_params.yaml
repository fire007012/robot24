# ============================================================
# car_control 节点参数配置
# ============================================================

# ------------------------------------------------------------
# base_cmd_node — 底盘速度安全中继
# 作用：对上游速度指令做限幅，并在超时后自动刹停底盘
# ------------------------------------------------------------
base_cmd_node:
  # 订阅的速度指令话题，来自 ds5_teleop_node 或其他上游节点
  input_topic: /car_control/cmd_vel

  # 转发给底盘驱动器的话题
  # Gazebo 履带底盘桥接节点订阅 /car_urdf/cmd_vel，并转发到
  # Gazebo tracked plugin 的 cmd_vel_twist 话题
  output_topic: /car_urdf/cmd_vel

  # 底盘线速度上限（m/s），超出部分会被截断
  max_linear_x: 0.8

  # 底盘角速度上限（rad/s），超出部分会被截断
  max_angular_z: 1.5

  # 超时刹停阈值（s）：若超过此时间未收到新指令，自动发布零速度
  # 防止通信中断时底盘持续运动
  timeout_sec: 0.5


# ------------------------------------------------------------
# tracked_cmd_bridge_node — ROS Twist -> Gazebo 履带插件桥接
# 作用：将 /car_urdf/cmd_vel 转为 Gazebo transport 上的
#       cmd_vel_twist，驱动 WheelTrackedVehiclePlugin
# ------------------------------------------------------------
tracked_cmd_bridge_node:
  input_topic: /car_urdf/cmd_vel
  gazebo_topic: ~/car_urdf/cmd_vel_twist
  max_linear_x: 0.8
  max_angular_z: 1.5
  linear_scale: -1.0
  angular_scale: -1.0
  timeout_sec: 0.5


# ------------------------------------------------------------
# gazebo_model_odom_node — Gazebo model_states -> /odom + TF
# 作用：从 Gazebo 模型状态提取 robot 位姿/速度，发布标准里程计
# ------------------------------------------------------------
gazebo_model_odom_node:
  model_states_topic: /gazebo/model_states
  model_name: robot
  odom_topic: /car_urdf/odom
  odom_frame: odom
  base_frame: base_link_root
  publish_tf: true
  publish_rate: 50.0


# ------------------------------------------------------------
# gripper_cmd_node — 夹爪控制节点
# 作用：将 Bool（开/合）或 Float64（精确位置）指令
#       转换为 JointTrajectory 发送给夹爪控制器
# ------------------------------------------------------------
gripper_cmd_node:
  # 精确位置控制话题（std_msgs/Float64），单位：米
  position_topic: /car_control/gripper_position

  # 一键开/合话题（std_msgs/Bool）：true=开爪，false=合爪
  open_close_topic: /car_control/gripper_open

  # 发布给夹爪控制器的话题（trajectory_msgs/JointTrajectory）
  output_topic: /gripper_controller/command

  # 夹爪关节名称，需与 URDF 中定义一致
  joint_name: left_gripper_finger_joint

  # 关节位置下限（m），用于 clamp 限幅，防止超程
  min_position: -0.022

  # 关节位置上限（m），用于 clamp 限幅，防止超程
  max_position: 0.03

  # 收到 Bool=true 时发送的目标位置（m），即完全张开
  open_position: 0.03

  # 收到 Bool=false 时发送的目标位置（m），即完全闭合
  close_position: -0.022

  # 关节轨迹的执行时间（s）：控制器在此时间内完成开/合动作
  move_duration: 0.8


# ------------------------------------------------------------
# servo_twist_frame_bridge_node — optical frame -> control frame
# 作用：把视觉/相机链路里以 optical frame 发布的 TwistStamped
#       转换为 MoveIt Servo 使用的相机本体控制坐标系
# ------------------------------------------------------------
servo_twist_frame_bridge_node:
  # 视觉链建议把 optical frame 下的 Twist 发布到这个输入话题
  input_topic: /car_control/delta_twist_cmds_optical

  # 转换后的输出话题，直接送到 MoveIt Servo
  output_topic: /servo_server/delta_twist_cmds

  # MoveIt Servo 当前使用的控制坐标系
  target_frame: catch_camera

  # 视觉相机/深度相机默认发布的 optical frame
  expected_source_frame: catch_camera_optical_frame

  # TF 查询超时（s）
  transform_timeout: 0.05

  # 收到非期望 source frame 时是否直接丢弃
  drop_unexpected_source_frame: true


# ------------------------------------------------------------
# ds5_teleop_node — DS4/DS5 手柄遥控节点
# 作用：解析手柄输入，分发底盘速度、机械臂 Servo 指令、夹爪指令
# 支持两种模式：CHASSIS（底盘）/ ARM_SERVO（机械臂 Servo）
# 按 Options 键切换模式
# ------------------------------------------------------------
ds5_teleop_node:
  # 手柄数据输入话题（sensor_msgs/Joy）
  joy_topic: /joy

  # 底盘速度指令输出话题（geometry_msgs/Twist）
  chassis_cmd_topic: /car_control/cmd_vel

  # MoveIt Servo 增量 Twist 输出话题（geometry_msgs/TwistStamped）
  servo_cmd_topic: /servo_server/delta_twist_cmds

  # Servo 指令的参考坐标系，需与 MoveIt Servo 配置一致。
  # 使用相机本体坐标系而不是 optical frame，避免 optical 坐标系的轴置换。
  servo_frame: catch_camera

  # 启动后用于核对 MoveIt Servo 当前控制坐标系的参数路径。
  servo_command_frame_param: /servo_server/robot_link_command_frame

  # 夹爪开/合输出话题（std_msgs/Bool）
  gripper_open_topic: /car_control/gripper_open

  # --- 速度上限 ---
  # CHASSIS 模式下底盘线速度上限（m/s），对应左摇杆 LY 满偏时的速度
  max_chassis_vx: 0.8

  # CHASSIS 模式下底盘角速度上限（rad/s），对应转向轴满偏时的角速度
  max_chassis_wz: 1.5

  # 底盘转向符号修正：+1 表示保持原始摇杆方向，-1 表示左右反向
  chassis_turn_sign: -1.0

  # ARM_SERVO 模式下末端线速度上限（m/s），对应摇杆/扳机满偏时的速度
  max_arm_linear: 0.15

  # ARM_SERVO 模式下末端角速度上限（rad/s），对应摇杆/L1R1 满偏时的角速度
  max_arm_angular: 0.6

  # CHASSIS 模式转向轴回退策略：
  # true  = 若 chassis_turn_axis_candidates 中所有轴均在死区内，
  #         则改用右摇杆 RX 作为转向输入（兜底）
  # false = 不做回退，转向量保持 0
  chassis_turn_use_rx_fallback: false

  # --- 安全参数 ---
  # 手柄超时阈值（s）：超过此时间未收到 /joy 消息，自动发布零速度
  cmd_timeout: 0.25

  # 摇杆死区阈值：轴值绝对值小于此值时视为 0，消除摇杆漂移
  deadzone: 0.12

  # --- 轴索引（DS4/DS5 在 Linux joy 驱动下的默认映射）---
  # 左摇杆水平轴（左负右正），CHASSIS 模式用于转向，ARM 模式用于 linear.y
  axis_lx: 0

  # 左摇杆垂直轴（上正下负），CHASSIS 模式用于前后，ARM 模式用于 linear.z
  axis_ly: 1

  # L2 扳机轴索引，ARM 模式下用于 linear.x 正方向
  # 当前这台机器的 js0 映射下，L2 实际落在 axis 2
  axis_l2: 2
  axis_l2_released: 0.0
  axis_l2_pressed: -1.0

  # 右摇杆水平轴（左负右正），ARM 模式用于 angular.z（yaw）
  # 当前这台机器的 js0 映射下，RX 实际落在 axis 3
  axis_rx: 3

  # 右摇杆垂直轴（上正下负），ARM 模式用于 angular.y（pitch）
  # 代码里会对该轴取反，让“上推”对应更直观的俯仰方向
  # 当前这台机器的 js0 映射下，RY 实际落在 axis 4
  axis_ry: 4

  # R2 扳机轴索引，ARM 模式下用于 linear.x 负方向
  axis_r2: 5
  axis_r2_released: 1.0
  axis_r2_pressed: -1.0

  # 十字键水平轴（左=-1，右=1），可作为底盘转向兜底输入
  axis_dpad_x: 6

  # 十字键垂直轴（上=1，下=-1），当前 ARM 模式下未使用
  axis_dpad_y: 7

  # CHASSIS 模式转向轴候选列表：[axis_lx, axis_dpad_x]
  # 节点会按列表顺序选择第一个脱离死区的轴作为转向输入
  # 这里明确不再把 RX 放入底盘转向候选，避免某些驱动下
  # L2 / RX 轴复用或串轴时误触发底盘转向。
  chassis_turn_axis_candidates: [0, 6]

  # --- 按键索引（DS4/DS5 在 Linux joy 驱动下的默认映射）---
  # □ 键：发送 gripper_open=true（打开夹爪）
  btn_square: 0

  # × 键：保留，暂未使用
  btn_cross: 1

  # ○ 键：发送 gripper_open=false（闭合夹爪）
  btn_circle: 2

  # △ 键：保留，暂未使用
  btn_triangle: 3

  # L1 键：ARM_SERVO 模式下控制 angular.x 正方向（roll）
  btn_l1: 4

  # R1 键：ARM_SERVO 模式下控制 angular.x 负方向（roll）
  btn_r1: 5

  # Options 键索引（DS5 上为 9）
  btn_options: 9

  # 模式切换按键列表：列表中任意一键的上升沿均触发 CHASSIS/ARM_SERVO 切换
  # 同时列出 9 和 10 以兼容不同驱动版本对 Options/Touchpad 键的映射差异
  # Support both common DS mappings for mode switch.
  mode_switch_buttons: [9, 10]
