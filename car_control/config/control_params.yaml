base_cmd_node:
  input_topic: /car_control/cmd_vel
  output_topic: /cmd_vel
  max_linear_x: 0.8
  max_angular_z: 1.5
  timeout_sec: 0.5

gripper_cmd_node:
  position_topic: /car_control/gripper_position
  open_close_topic: /car_control/gripper_open
  output_topic: /gripper_controller/command
  joint_name: left_gripper_finger_joint
  min_position: -0.022
  max_position: 0.03
  open_position: 0.03
  close_position: -0.022
  move_duration: 0.8

ds5_teleop_node:
  joy_topic: /joy
  chassis_cmd_topic: /car_control/cmd_vel
  servo_cmd_topic: /servo_server/delta_twist_cmds
  servo_frame: base_link_root
  gripper_open_topic: /car_control/gripper_open

  max_chassis_vx: 0.8
  max_chassis_wz: 1.5
  max_arm_linear: 0.15
  max_arm_angular: 0.6

  cmd_timeout: 0.25
  deadzone: 0.12

  # DS4/DS5 default mapping on Linux joy
  axis_lx: 0
  axis_ly: 1
  axis_l2: 2
  axis_rx: 3
  axis_ry: 4
  axis_r2: 5
  axis_dpad_x: 6
  axis_dpad_y: 7

  btn_square: 0
  btn_cross: 1
  btn_circle: 2
  btn_triangle: 3
  btn_l1: 4
  btn_r1: 5
  btn_options: 9
