arm_position_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - shoulder_yaw_joint
    - shoulder_pitch_joint
    - elbow_pitch_joint
    - wrist_pitch_joint
    - wrist_roll_joint
    - wrist_yaw_joint
  gains:
    shoulder_yaw_joint:
      p: 100
      d: 1
      i: 1
      i_clamp: 1
    shoulder_pitch_joint:
      p: 100
      d: 1
      i: 1
      i_clamp: 1
    elbow_pitch_joint:
      p: 100
      d: 1
      i: 1
      i_clamp: 1
    wrist_pitch_joint:
      p: 100
      d: 1
      i: 1
      i_clamp: 1
    wrist_roll_joint:
      p: 100
      d: 1
      i: 1
      i_clamp: 1
    wrist_yaw_joint:
      p: 100
      d: 1
      i: 1
      i_clamp: 1
  constraints:
    # Gazebo often converges slightly slower than the idealized MoveIt
    # trajectory timing, so keep the arm JTC from aborting on tiny residuals.
    goal_time: 3.0
    stopped_velocity_tolerance: 0.1
    shoulder_yaw_joint:
      trajectory: 0.05
      goal: 0.01
    shoulder_pitch_joint:
      trajectory: 0.05
      goal: 0.01
    elbow_pitch_joint:
      trajectory: 0.05
      goal: 0.01
    wrist_pitch_joint:
      trajectory: 0.05
      goal: 0.01
    wrist_roll_joint:
      trajectory: 0.05
      goal: 0.01
    wrist_yaw_joint:
      trajectory: 0.05
      goal: 0.01
  state_publish_rate: 50
  action_monitor_rate: 20

flipper_csp_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - left_front_arm_joint
    - right_front_arm_joint
    - left_rear_arm_joint
    - right_rear_arm_joint
  allow_partial_joints_goal: true
  constraints:
    goal_time: 1.0
    stopped_velocity_tolerance: 0.05
    left_front_arm_joint:
      trajectory: 0.05
      goal: 0.02
    right_front_arm_joint:
      trajectory: 0.05
      goal: 0.02
    left_rear_arm_joint:
      trajectory: 0.05
      goal: 0.02
    right_rear_arm_joint:
      trajectory: 0.05
      goal: 0.02
  state_publish_rate: 50
  action_monitor_rate: 20

gripper_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - left_gripper_finger_joint
  gains:
    left_gripper_finger_joint:
      p: 100
      d: 1
      i: 1
      i_clamp: 1
  constraints:
    goal_time: 1.0
    stopped_velocity_tolerance: 0.02
    left_gripper_finger_joint:
      trajectory: 0.01
      goal: 0.005
  state_publish_rate: 50
  action_monitor_rate: 20
