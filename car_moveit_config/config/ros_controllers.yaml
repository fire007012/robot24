arm_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - shoulder_yaw_joint
    - shoulder_pitch_joint
    - elbow_pitch_joint
    - wrist_pitch_joint
    - wrist_roll_joint
    - wrist_yaw_joint
  constraints:
    goal_time: 5.0
    stopped_velocity_tolerance: 0.05
  state_publish_rate: 25
  action_monitor_rate: 10

gripper_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - left_gripper_finger_joint
  constraints:
    goal_time: 5.0
    stopped_velocity_tolerance: 0.05
