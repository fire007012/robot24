# Publish joint_states
joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 50

arm_position_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - shoulder_yaw_joint
    - shoulder_pitch_joint
    - elbow_pitch_joint
    - wrist_pitch_joint
    - wrist_roll_joint
    - wrist_yaw_joint
  constraints:
    goal_time: 2.0
    stopped_velocity_tolerance: 0.05
    shoulder_yaw_joint: {trajectory: 0.10, goal: 0.02}
    shoulder_pitch_joint: {trajectory: 0.10, goal: 0.02}
    elbow_pitch_joint: {trajectory: 0.10, goal: 0.02}
    wrist_pitch_joint: {trajectory: 0.10, goal: 0.02}
    wrist_roll_joint: {trajectory: 0.10, goal: 0.02}
    wrist_yaw_joint: {trajectory: 0.10, goal: 0.02}
  stop_trajectory_duration: 0.1
  state_publish_rate: 50
  action_monitor_rate: 20

gripper_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - left_gripper_finger_joint
  gains:
    left_gripper_finger_joint: {p: 1200.0, i: 2.0, d: 20.0, i_clamp: 1.0}
  constraints:
    goal_time: 1.0
    stopped_velocity_tolerance: 0.02
    left_gripper_finger_joint: {trajectory: 0.01, goal: 0.005}
  stop_trajectory_duration: 0.1
  state_publish_rate: 50
  action_monitor_rate: 20

gazebo_ros_control:
  pid_gains:
    shoulder_yaw_joint: {p: 100.0, i: 0.1, d: 1.0}
    shoulder_pitch_joint: {p: 100.0, i: 0.1, d: 1.0}
    elbow_pitch_joint: {p: 100.0, i: 0.1, d: 1.0}
    wrist_pitch_joint: {p: 80.0, i: 0.1, d: 0.8}
    wrist_roll_joint: {p: 80.0, i: 0.1, d: 0.8}
    wrist_yaw_joint: {p: 80.0, i: 0.1, d: 0.8}
    left_gripper_finger_joint: {p: 40.0, i: 0.05, d: 0.2}
    right_gripper_finger_joint: {p: 40.0, i: 0.05, d: 0.2}
