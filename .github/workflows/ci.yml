name: CI (ROS Noetic, workspace)

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: osrf/ros:noetic-desktop-full
    env:
      CATKIN_WS: /root/catkin_ws
      ROS_MASTER_URI: http://127.0.0.1:11311
      ROS_IP: 127.0.0.1
      ROS_HOSTNAME: 127.0.0.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -eux
          apt-get update
          # rosdep may miss socketcan_interface in some images; install explicitly.
          apt-get install -y --no-install-recommends \
            build-essential cmake git python3-rosdep \
            ros-noetic-catkin ros-noetic-rostest \
            ros-noetic-ddynamic-reconfigure \
            ros-noetic-socketcan-interface

      - name: Fetch submodule sources
        shell: bash
        run: |
          set -eux
          rm -rf can_driver Eyou_Canopen_Master realsense-ros
          git clone --depth 1 https://github.com/dianhuaeven/can_driver.git can_driver
          git clone --depth 1 https://github.com/dianhuaeven/Eyou_Canopen_master.git Eyou_Canopen_Master
          git clone --depth 1 https://github.com/IntelRealSense/realsense-ros.git realsense-ros

      - name: Normalize ROS hostname resolution
        shell: bash
        run: |
          set -eux
          HOSTNAME_VALUE="$(hostname)"
          if ! getent hosts "$HOSTNAME_VALUE" >/dev/null 2>&1; then
            echo "127.0.0.1 $HOSTNAME_VALUE" >> /etc/hosts
          fi
          getent hosts localhost
          getent hosts "$HOSTNAME_VALUE"

      - name: Setup catkin workspace and place sources
        shell: bash
        run: |
          set -eux
          mkdir -p "$CATKIN_WS/src"
          shopt -s dotglob
          cp -a ./* "$CATKIN_WS/src/"
          source /opt/ros/noetic/setup.bash
          # Skip trees that are not buildable in this ROS 1 CI environment.
          if [ -d "$CATKIN_WS/src/realsense-ros" ]; then
            touch "$CATKIN_WS/src/realsense-ros/CATKIN_IGNORE"
          fi
          for skipped_pkg in Eyou_Canopen_Master Eyou_ROS1_Master flipper_control control arm_traj_splitter; do
            if [ -d "$CATKIN_WS/src/$skipped_pkg" ]; then
              touch "$CATKIN_WS/src/$skipped_pkg/CATKIN_IGNORE"
            fi
          done
          for skipped_tree in \
            can_driver/lib/myactuator_rmd-main \
            can_driver/lib/myactuator_rmd_ros-main; do
            if [ -d "$CATKIN_WS/src/$skipped_tree" ]; then
              touch "$CATKIN_WS/src/$skipped_tree/CATKIN_IGNORE"
            fi
          done
          # Keep or refresh apt indexes before rosdep, otherwise apt-based rosdeps
          # that are not preinstalled in the image may become unresolvable.
          apt-get update
          rosdep init || true
          rosdep update --rosdistro noetic
          rosdep install --from-paths "$CATKIN_WS/src" --ignore-src -r -y --rosdistro noetic \
            --dependency-types build \
            --dependency-types buildtool \
            --dependency-types build_export \
            --dependency-types test

      - name: Build
        shell: bash
        run: |
          set -eux
          export ROS_MASTER_URI=http://127.0.0.1:11311
          export ROS_IP=127.0.0.1
          export ROS_HOSTNAME=127.0.0.1
          source /opt/ros/noetic/setup.bash
          cd "$CATKIN_WS"
          catkin_make -DCATKIN_ENABLE_TESTING=ON

      - name: Run tests
        shell: bash
        run: |
          set -eux
          export ROS_MASTER_URI=http://127.0.0.1:11311
          export ROS_IP=127.0.0.1
          export ROS_HOSTNAME=127.0.0.1
          source /opt/ros/noetic/setup.bash
          cd "$CATKIN_WS"
          source devel/setup.bash
          # These packages only register offline gtests / nosetests.
          # Running them without a ROS core avoids noisy XMLRPC retries in CI.
          catkin_make run_tests -j2

      - name: Collect results
        shell: bash
        run: |
          set -eux
          source /opt/ros/noetic/setup.bash
          cd "$CATKIN_WS"
          catkin_test_results build || (cat build/*/test_results/*/*.xml || true; false)
