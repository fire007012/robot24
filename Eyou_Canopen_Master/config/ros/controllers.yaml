# ros_control controller 配置。

joint_state_controller:
  type: joint_state_controller/JointStateController
  publish_rate: 100

# CSP 模式: JointTrajectoryController（供 MoveIt FollowJointTrajectory action 使用）。
arm_position_controller:
  type: position_controllers/JointTrajectoryController
  joints:
    - joint_1
    - joint_2
    - joint_3
    - joint_4
    - joint_5
    - joint_6

# CSV 模式: 速度前馈轨迹控制器。
# 使用前需先通过 ~set_mode service 切换到 CSV（halt → set_mode → recover）。
arm_velocity_controller:
  type: velocity_controllers/JointTrajectoryController
  joints:
    - joint_1
    - joint_2
    - joint_3
    - joint_4
    - joint_5
    - joint_6
