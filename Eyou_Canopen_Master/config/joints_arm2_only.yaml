# 每个关节的运行时参数配置。

canopen:
  interface: "can0"
  master_node_id: 127
  loop_hz: 200.0
  auto_write_soft_limits_from_urdf: true

joints:
  - name: shoulder_yaw_joint
    canopen:
      node_id: 5
      verify_pdo_mapping: false
      default_mode: 7
    counts_per_rev: 6619136
    rated_torque_nm: 1.0
    position_lock_threshold: 15000
    max_fault_resets: 3
    fault_reset_hold_cycles: 5
    ip_interpolation_period_ms: 5
    max_velocity_for_clamp: 500000
    velocity_scale: 1.0
    torque_scale: 1.0
    ip_max_velocity: 0.5
    ip_max_acceleration: 0.5
    ip_max_jerk: 5.0
    ip_goal_tolerance: 0.001
  - name: shoulder_pitch_joint
    canopen:
      node_id: 6
      verify_pdo_mapping: false
      default_mode: 7
    counts_per_rev: 6619136
    rated_torque_nm: 1.0
    position_lock_threshold: 15000
    max_fault_resets: 3
    fault_reset_hold_cycles: 5
    ip_interpolation_period_ms: 5
    max_velocity_for_clamp: 500000
    velocity_scale: 1.0
    torque_scale: 1.0
    ip_max_velocity: 0.5
    ip_max_acceleration: 0.5
    ip_max_jerk: 5.0
    ip_goal_tolerance: 0.001