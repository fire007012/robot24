# can_driver hardware configuration
# Parameters are loaded under /can_driver_node/* via the top-level key below.

can_driver_node:
  control_frequency: 100.0

  # Must stay false during ros_control / MoveIt execution.
  debug_bypass_ros_control: false

  motor_query_hz: 0.0

  # can_B side motors: 4 arm joints + 2 tracks
  joints:
    - name: arm_joint_1
      motor_id: 0x06
      protocol: PP
      can_device: can1
      control_mode: position

    - name: arm_joint_2
      motor_id: 0x05
      protocol: PP
      can_device: can1
      control_mode: position

    - name: arm_joint_3
      motor_id: 0x13
      protocol: PP
      can_device: can1
      control_mode: position

    - name: arm_joint_4
      motor_id: 0x14
      protocol: PP
      can_device: can1
      control_mode: position

    - name: left_track
      motor_id: 0x141
      protocol: MT
      can_device: can1
      control_mode: velocity

    - name: right_track
      motor_id: 0x142
      protocol: MT
      can_device: can1
      control_mode: velocity
